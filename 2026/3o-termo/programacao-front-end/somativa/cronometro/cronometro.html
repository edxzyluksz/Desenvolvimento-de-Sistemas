<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro</title>
    <link rel="stylesheet" href="style.css"> <!-- conexão com o css externo  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Adição da biblioteca Font Awesome para útilização de ícones -->
<body>
    <div id="cronometro">
        <h2 id="timer">
            00:00:00:000
        </h2>
        <!-- Criação dos botões interativos, reset, start, pause e mark -->
        <div id="actions">
            <button id="reset">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
            <button id="power" action="start">
                <i class="fa-solid fa-play"></i>
            </button>
            <button id="mark">
                <i class="fa-solid fa-flag"></i>
            </button>
        </div>

        <!-- Criação da lista de marcações -->
        <div id="marks-list">
        </div>
    </div>
</body>
<!-- informa que o código esta no arquivo externo de js -->
<script src="script.js"></script>
</html>
