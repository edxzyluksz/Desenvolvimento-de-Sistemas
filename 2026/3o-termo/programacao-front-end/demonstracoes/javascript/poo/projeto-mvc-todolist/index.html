<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas MVC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Lista de Tarefas</h1>

        <div class="form-area">
            <input type="text" name="taskInput" id="taskInput" placeholder="Digite uma Tarefa...">
            <button id="addTaskBtn">Adicionar</button>
        </div>

        <p id="message"></p>

        <ul id="listTasks"></ul>
    </div>
    
</body>
<script type="module" src="js/app.js"></script>
</html>
