<section class="container-vagas">
  <div class="page-header-intro">
    <h1>Vagas</h1>
    <h2><a href="/painel-vagas">Ver painel</a></h2>
  </div>

  <section class="card-list">
      @for (vaga of vagas; track vaga.id) {
        <div class="card">
          <img src="/assets/img/vagas/{{vaga.foto}}" alt="...">
          <div class="card-body">
            <h5>Código da Vaga: {{ vaga.id }}</h5>
            <h5>Vaga: {{ vaga.nome }}</h5>
            <p>Descrição da Vaga: {{ vaga.descricao }}</p>
            <p>Salário: R$ {{ vaga.salario }}</p>
          </div>
        </div>
      }
  </section>
</section>
