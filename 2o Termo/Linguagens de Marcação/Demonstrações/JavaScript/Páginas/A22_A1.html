<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A22-A1.</title>
    <style>
        :root {
            --c: #0d47a1;
            --b: #f8fafc;
            --t: #111827;
            --card: #fff;
            --bd: #e5e7eb;

        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            color: var(--t);
            background: var(--b);
        }

        header {
            background: var(--c);
            color: #fff;
            padding: 24px 16px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
        }

        main {
            max-width: 920px;
            margin: 24px auto;
            padding: 0 16px;
            display: grid;
            gap: 16px;
        }

        section {
            background: var(--card);
            border: 1px solid var(--bd);
            border-radius: 12px;
            padding: 16px;
        }

        section h2 {
            margin: 0 0 8px 0;
            font-size: 18px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        button {
            cursor: pointer;
            border: 1px solid var(--bd);
            background: #fff;
            border-radius: 10px;
            padding: 8px 12px;
        }

        input,
        select {
            border: 1px solid var(--bd);
            border-radius: 8px;
            padding: 8px;
        }

        .pill {
            display: inline-block;
            padding: 2px 8px;
            border: 1px solid var(--bd);
            border-radius: 999px;
            background: #fff;
        }

        .muted {
            color: #31eb18;
            font-size: 14px;
        }

        .output {
            white-space: pre-wrap;
            background: #f3f4f6;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            padding: 10px;
            min-height: 40px;
            gap: 5px;
            margin-top: 10px
        }
    </style>
</head>

<body>
    <header>
        <h1>JS na prática: Variáveis, funções, DOM, eventos e debugging</h1>
        <p class="muted">Use o console (F2 → Console) para ver logs adicionais</p>
    </header>
    <main>
        <!--Fundamentos: Variáveis, Tipos e Operadores-->
        <section id="fundamentos">
            <h2>1) Fundamentos do JS</h2>
            <p class="muted">Declarações de variáveis, tipos de dados e operadores</p>
            <div class="row">
                <button id="btnTipos">Mostrar tipos (typeof) no console e aqui</button>
                <span class="pill">let / const - string - number - boolean - array - object</span>
            </div>
            <div class="output" aria-live="polite"><code id="tiposOut"></code></div>
        </section>
    </main>
    <script>
        // Parte 1) Fundamentos do JS
        const btnTipos = document.getElementById("btnTipos");
        const tiposOut = document.getElementById("tiposOut");
        btnTipos.addEventListener("click", () => {
            let texto = "Olá SENAI";
            let numero = 42;
            let booleano = true;
            let nulo = null;
            let indef;
            let lista = ["Maçã", "Uva"];
            let aluno = { nome: "Ana", idade: 20 }

            // Primeira coisa: Exibir no console
            console.log("Tipos (typeof):");
            console.log(typeof (texto), typeof (numero), typeof (booleano), typeof (nulo), typeof (indef));
            console.table({ texto, numero, booleano, nulo, indef, lista, aluno });

            // Segunda coisa: Exibido na página HTML
            if (tiposOut.textContent == "") {
                btnTipos.textContent = "Esconder tipos (typeof) no console e aqui"
                tiposOut.textContent =
                    `typeof ${texto} → ${typeof texto} \n` +
                    `typeof ${numero} → ${typeof numero} \n` +
                    `typeof ${booleano} → ${typeof booleano} \n` +
                    `typeof ${nulo} → ${typeof nulo} (Bug histórico do JS) \n` +
                    `typeof undefined → ${typeof indef} \n` +
                    `typeof ${lista} → ${typeof lista} (Array é um obj especial) \n` +
                    `typeof {nome: "Ana", idade: 20} → ${typeof aluno} \n`
            }
            else {
                btnTipos.textContent = "Mostrar tipos (typeof) no console e aqui"
                tiposOut.textContent = ""
                console.clear()
            };
        });
    </script>
</body>

</html>
